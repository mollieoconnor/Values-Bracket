<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness: Tournament of Values</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #fef3c7;
            /* Watermark background: repeating subtle basketball pattern */
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' font-size='30' opacity='0.05'%3E🏀%3C/text%3E%3C/svg%3E"),
                linear-gradient(90deg, rgba(139, 69, 19, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(139, 69, 19, 0.03) 1px, transparent 1px);
            background-size: 120px 120px, 40px 100%, 100% 40px;
            margin: 0;
            padding: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
        }

        .scout-sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            z-index: 1000;
        }

        .scout-clipboard {
            background: #1a1a1a;
            color: white;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid #333;
            height: 600px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .main-layout {
            margin-left: 360px;
            padding: 40px;
            min-width: 1550px;
        }

        .bracket-grid {
            display: grid;
            grid-template-columns: 180px 180px 180px 320px 180px 180px 180px;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .game-box {
            background: #1e293b;
            border: 2px solid #ea580c;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .slot {
            background: white;
            padding: 10px 12px;
            font-weight: 800;
            min-height: 50px;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.8rem;
            border-bottom: 2px solid #1e293b;
            text-transform: uppercase;
            color: #1e293b;
            transition: all 0.2s;
        }

        .slot:last-child { border-bottom: none; }
        .slot:hover { background: #ea580c; color: white; }
        .slot.winner { background: #fb923c; color: white; }
        .slot.empty { background: #334155; color: #94a3b8; cursor: default; font-style: italic; }

        .vs-divider {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            background: #ea580c;
            color: white;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 2px 4px;
            border-radius: 2px;
            z-index: 10;
        }

        .champion-card {
            background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
            color: white;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(234, 88, 12, 0.6);
            padding: 2.5rem 1.5rem;
            text-align: center;
            border-radius: 1rem;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .passing-ball {
            position: fixed;
            font-size: 2.5rem;
            z-index: 9999;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- PRINT STYLES FOR 11x8.5 LANDSCAPE FIT --- */
        @media print {
            @page {
                size: landscape;
                margin: 0.2in;
            }
            
            body {
                background: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .scout-sidebar, .no-print { 
                display: none !important; 
            }

            .main-layout {
                margin: 0 !important;
                padding: 0 !important;
                min-width: unset !important;
                width: 100vw !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: flex-start !important;
                transform: scale(0.64); /* Fine-tuned scaling for 11x8.5 */
                transform-origin: top center;
            }

            header {
                margin-bottom: 20px !important;
            }

            .bg-white\/90 {
                background: white !important;
                box-shadow: none !important;
                border: 1px solid #ddd !important;
            }

            input {
                border-bottom: 2px solid black !important;
                color: black !important;
            }
        }
    </style>
</head>
<body>
    <div class="scout-sidebar no-print">
        <div class="scout-clipboard">
            <div class="p-6 flex-grow">
                <div id="default-msg" class="text-center opacity-40 mt-20">
                    <span class="text-6xl mb-6 block">🏀</span>
                    <p class="font-black uppercase tracking-widest text-sm text-white">Hover over a Value to see the Scout Report</p>
                </div>
                <div id="report-content" class="hidden">
                    <div class="flex items-center gap-3 mb-4">
                        <span id="report-icon" class="text-4xl"></span>
                        <h2 id="report-title" class="text-xl font-black text-orange-500 uppercase italic"></h2>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <div class="text-[10px] uppercase text-green-400 font-bold mb-1 border-l-2 border-green-400 pl-2">Definition</div>
                            <p id="report-desc" class="text-slate-300 text-sm leading-relaxed"></p>
                        </div>
                        <div class="bg-blue-900/30 p-4 rounded border border-blue-500/20">
                            <div class="text-[10px] uppercase text-blue-400 font-bold mb-2 italic">Example of a Minuteman in Action</div>
                            <p id="report-ex" class="text-blue-100 text-xs leading-relaxed italic"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-white/10 text-center">
                <p class="text-[10px] uppercase font-black tracking-widest text-slate-500 italic">Created by Mollie O'Connor</p>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-black text-slate-900 italic uppercase">Tournament of <span class="text-orange-600">Values</span></h1>
            <div class="mt-4">
                <input type="text" id="student-name-input" placeholder="ENTER STUDENT NAME" class="uppercase font-black text-2xl text-center border-b-4 border-slate-900 bg-transparent outline-none w-96 focus:border-orange-500 transition-colors">
            </div>
        </header>

        <div class="bg-white/90 p-10 rounded-3xl shadow-2xl border-2 border-slate-200 backdrop-blur-sm">
            <div class="bracket-grid" id="bracket-root">
                <div class="text-center font-bold text-slate-400 text-[10px] uppercase">First Round</div>
                <div class="text-center font-bold text-slate-400 text-[10px] uppercase">Sweet 16</div>
                <div class="text-center font-bold text-slate-400 text-[10px] uppercase">Elite 8</div>
                <div class="text-center font-black text-orange-600 text-xs uppercase italic tracking-widest">National Championship</div>
                <div class="text-center font-bold text-slate-400 text-[10px] uppercase">Elite 8</div>
                <div class="text-center font-bold text-slate-400 text-[10px] uppercase">Sweet 16</div>
                <div class="text-center font-bold text-slate-400 text-[10px] uppercase">First Round</div>

                <div class="space-y-4" id="left-r1"></div>
                <div class="space-y-20" id="left-r2"></div>
                <div class="space-y-[180px]" id="left-r3"></div>

                <div class="flex flex-col items-center justify-between min-h-[620px] py-10">
                    <div id="f4-left" class="w-full"></div>
                    <div id="champ-court" class="w-full py-6 flex items-center justify-center"></div>
                    <div id="f4-right" class="w-full"></div>
                </div>

                <div class="space-y-[180px]" id="right-r3"></div>
                <div class="space-y-20" id="right-r2"></div>
                <div class="space-y-4" id="right-r1"></div>
            </div>
        </div>

        <div class="mt-10 flex flex-wrap justify-center gap-4 no-print">
            <button onclick="resetTournament()" class="bg-slate-300 px-6 py-3 rounded-full font-black text-[10px] uppercase hover:bg-red-500 hover:text-white transition">Reset Bracket</button>
            <button id="share-btn" onclick="shareBracket()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-black text-sm uppercase shadow-lg hover:bg-blue-700 transition">Copy Share Link</button>
            <button onclick="window.print()" class="bg-orange-600 text-white px-10 py-3 rounded-full font-black text-sm uppercase shadow-lg hover:scale-105 transition">Download PDF</button>
        </div>
    </div>

    <script>
        const valuesData = {
            "Honesty": { desc: "The quality of being fair and truthful. It’s about more than just not lying; it's about being real with yourself and others.", ex: "You notice you got extra change back at the store. Instead of keeping it, you go back inside to return the extra $5 because your personal word is worth more than a free lunch.", icon: "📢" },
            "Popularity": { desc: "The state of being liked, admired, or supported by a large number of people. It’s about influence and social connection.", ex: "You choose to join a specific club or act a certain way because you want to feel included and respected by the majority of your peers at school.", icon: "⭐️" },
            "Loyalty": { desc: "A strong feeling of support or allegiance. It’s the 'ride or die' mentality—standing by people through thick and thin.", ex: "Your friend makes an embarrassing social mistake and everyone is laughing. You stand right next to them and defend them, showing everyone you aren't a fair-weather friend.", icon: "🤝" },
            "Success": { desc: "The accomplishment of an aim or purpose. It is the drive to reach the finish line and see your hard work pay off.", ex: "You stay in on a Friday night to study for a difficult final or train early in the morning for a big game because the feeling of achievement is your primary goal.", icon: "🏆" },
            "Kindness": { desc: "The quality of being friendly, generous, and considerate without expecting anything in return.", ex: "You notice a student sitting alone in the cafeteria who looks nervous. You decide to sit with them and start a conversation, even if it means missing a joke at your regular table.", icon: "❤️" },
            "Fame": { desc: "The state of being known or talked about by many people, especially on account of notable achievements.", ex: "You work hard to build a public reputation or a massive social media following because you want your voice and face to be recognized globally.", icon: "📸" },
            "Justice": { desc: "The principle of moral rightness and equity. It’s the drive to ensure that everyone gets what they deserve fairly.", ex: "You speak up when you see a teacher or a peer treating someone unfairly based on a stereotype, even if it might make the situation awkward for you.", icon: "⚖️" },
            "Security": { desc: "The state of being free from danger or threat. It’s valuing stability, safety, and knowing what to expect tomorrow.", ex: "You choose a career path or a lifestyle that is stable and guaranteed over a risky dream because you want to make sure you can always support yourself and your family.", icon: "🛡️" },
            "Creativity": { desc: "The use of imagination or original ideas to create something. It's about finding new ways to express who you are.", ex: "You spend your free time coding a new app, writing a song, or painting a mural because expressing your inner world is how you feel most alive.", icon: "🎨" },
            "Power": { desc: "The capacity or ability to direct or influence the behavior of others or the course of events.", ex: "You run for Student Council President or a leadership role in a club because you want to be the one making the final decisions and leading the direction of the group.", icon: "⚡️" },
            "Nature": { desc: "A deep appreciation for the physical world and its preservation. It's about feeling connected to the environment.", ex: "You choose to spend your weekend hiking or volunteering for a community garden instead of staying inside playing video games or watching TV.", icon: "🌲" },
            "Equality": { desc: "The state of being equal, especially in status, rights, and opportunities. It’s about breaking down barriers.", ex: "You advocate for equal funding for different school programs because you believe every student deserves the same resources to reach their potential.", icon: "👥" },
            "Wisdom": { desc: "The quality of having experience, knowledge, and good judgment. It’s about seeking the 'why' behind things.", ex: "You ask an older mentor or a grandparent for advice before making a major life decision because you value the perspective that comes with life experience.", icon: "🦉" },
            "Privacy": { desc: "The state of being free from public attention or disturbance. It’s valuing your internal world over external sharing.", ex: "You choose not to post your personal life or struggles on social media because you believe your best moments are meant only for you and those you trust.", icon: "🔑" },
            "Reliability": { desc: "The quality of being trustworthy and performing consistently well. People know they can count on you.", ex: "If you say you will be at a group meeting at 8:00 AM, you are there at 7:55 AM every single time. Your teammates never have to worry about you showing up.", icon: "🧱" },
            "Optimism": { desc: "Hopefulness and confidence about the future or the successful outcome of something.", ex: "Even when your team is down late in the game, you’re the one in the huddle saying 'We can still win this if we focus.' You always see the path to success.", icon: "☀️" },
            "Bravery": { desc: "Courageous behavior or character. It is not the absence of fear, but doing the right thing in spite of it.", ex: "You admit you were wrong in front of a large group of people, even though you know it will be embarrassing, because owning your mistakes is the right move.", icon: "🦁" },
            "Comfort": { desc: "A state of physical ease and freedom from pain or constraint. Valuing a life that is peaceful and enjoyable.", ex: "You create a home or workspace that is cozy and stress-free because your mental health depends on having a peaceful place to land after a long day.", icon: "🛋️" },
            "Respect": { desc: "A feeling of deep admiration for someone elicited by their abilities, qualities, or achievements.", ex: "You listen intently to someone you completely disagree with, not to find a way to argue, but because you value them as a person with a valid perspective.", icon: "🫡" },
            "Wealth": { desc: "An abundance of valuable possessions or money. Valuing the freedom and resources that money can provide.", ex: "You start a small business in high school or work extra hours because you want to build a financial foundation that allows you to travel and live freely.", icon: "💰" },
            "Freedom": { desc: "The power or right to act, speak, or think as one wants without hindrance or restraint.", ex: "You choose a path that allows you to be your own boss because you cannot stand the idea of someone else dictating your schedule or your thoughts.", icon: "🗽" },
            "Tradition": { desc: "The transmission of customs or beliefs from generation to generation. Valuing the roots you came from.", ex: "You insist on keeping a specific family holiday tradition alive even when others are busy because it connects you to your ancestors and your history.", icon: "🕰️" },
            "Ambition": { desc: "A strong desire to do or to achieve something, typically requiring determination and hard work.", ex: "You set a goal to be the first person in your family to graduate college and you work three jobs and study late every night to make it a reality.", icon: "🚀" },
            "Peace": { desc: "Freedom from disturbance; tranquility. Valuing harmony over conflict at all costs.", ex: "You act as the mediator in a friend group argument, helping everyone find a middle ground so the 'drama' ends and everyone can be friends again.", icon: "🕊️" },
            "Intelligence": { desc: "The ability to acquire and apply knowledge and skills. Valuing the power of the mind and logic.", ex: "You spend your lunch break in the library researching a complex topic that wasn't even assigned in class, just because you want to understand the world better.", icon: "🧠" },
            "Humor": { desc: "The quality of being amusing or comic. Valuing the ability to find light in dark situations.", ex: "You crack a joke to ease the tension during a high-stakes group project because you know that a little laughter helps everyone think more clearly.", icon: "🎭" },
            "Health": { desc: "The state of being free from illness or injury—both physical and mental. Valuing the body as a temple.", ex: "You turn down a late-night party because you know you need your rest to feel your best for a morning workout or a big presentation.", icon: "🍎" },
            "Adventure": { desc: "An unusual and exciting, typically hazardous, experience or activity. Valuing the unknown.", ex: "You sign up for an exchange program in a country where you don't speak the language because the challenge of the unknown excites you more than safety.", icon: "🌋" },
            "Patience": { desc: "The capacity to accept or tolerate delay, trouble, or suffering without getting angry or upset.", ex: "You spend hours helping a younger student with their homework, staying calm and encouraging even when they struggle to understand the same concept for the 10th time.", icon: "⏳" },
            "Generosity": { desc: "The quality of being kind and generous. Giving more of something than is strictly necessary.", ex: "You anonymously donate your savings to a peer who is struggling to pay for a school trip, wanting to help without needing any credit for the act.", icon: "🎁" },
            "Integrity": { desc: "The quality of being honest and having strong moral principles. Doing the right thing when no one is watching.", ex: "You refuse to use a cheat sheet on a test even though the teacher left the room and every other student is sharing answers.", icon: "💎" },
            "Leadership": { desc: "The action of leading a group of people or an organization. Taking responsibility for the 'we'.", ex: "You take charge of a confused group project, assigning clear roles and ensuring everyone’s voice is heard so the team succeeds together.", icon: "📣" }
        };

        const leftR1Seeds = Object.keys(valuesData).slice(0, 16);
        const rightR1Seeds = Object.keys(valuesData).slice(16, 32);

        let state = {
            studentName: "",
            leftR1: [...leftR1Seeds], rightR1: [...rightR1Seeds],
            leftR2: Array(8).fill(null), rightR2: Array(8).fill(null),
            leftR3: Array(4).fill(null), rightR3: Array(4).fill(null),
            f4Left: Array(2).fill(null), f4Right: Array(2).fill(null),
            champGame: [null, null], 
            champion: null
        };

        function showReport(val) {
            if (!val) return;
            document.getElementById('default-msg').classList.add('hidden');
            document.getElementById('report-content').classList.remove('hidden');
            document.getElementById('report-title').innerText = val;
            document.getElementById('report-icon').innerText = valuesData[val].icon;
            document.getElementById('report-desc').innerText = valuesData[val].desc;
            document.getElementById('report-ex').innerText = valuesData[val].ex;
        }

        function createSlot(val, round, idx, isWinner) {
            const slot = document.createElement('div');
            slot.id = `slot-${round}-${idx}`;
            if (!val) {
                slot.className = 'slot empty';
                slot.innerText = '---';
                return slot;
            }
            slot.className = 'slot' + (isWinner ? ' winner' : '');
            slot.innerHTML = `<span>${valuesData[val].icon}</span> <span class="ml-2 truncate">${val}</span>`;
            slot.onmouseenter = () => showReport(val);
            slot.onclick = (e) => handleSelection(val, round, idx, e.currentTarget);
            return slot;
        }

        function handleSelection(val, round, idx, el) {
            const nextRoundInfo = getNextRound(round, idx);
            if (!nextRoundInfo) return; 
            
            const { nextRound, nextIdx } = nextRoundInfo;
            
            if (state[nextRound] && state[nextRound][nextIdx] !== null) {
                resetForward(nextRound, nextIdx);
            } else if (nextRound === 'champion' && state.champion !== null) {
                state.champion = null;
            }

            if (nextRound === 'champion') {
                state.champion = val;
            } else {
                state[nextRound][nextIdx] = val;
            }

            animateBall(el, nextRound, nextIdx, () => {
                if (nextRound === 'champion') triggerCelebration();
                render();
                saveState();
            });
        }

        function getNextRound(round, idx) {
            const nextIdx = Math.floor(idx / 2);
            if (round === 'leftR1') return { nextRound: 'leftR2', nextIdx };
            if (round === 'rightR1') return { nextRound: 'rightR2', nextIdx };
            if (round === 'leftR2') return { nextRound: 'leftR3', nextIdx };
            if (round === 'rightR2') return { nextRound: 'rightR3', nextIdx };
            if (round === 'leftR3') return { nextRound: 'f4Left', nextIdx };
            if (round === 'rightR3') return { nextRound: 'f4Right', nextIdx };
            if (round === 'f4Left') return { nextRound: 'champGame', nextIdx: 0 };
            if (round === 'f4Right') return { nextRound: 'champGame', nextIdx: 1 };
            if (round === 'champGame') return { nextRound: 'champion', nextIdx: 0 };
            return null;
        }

        function resetForward(round, idx) {
            if (round === 'champion') {
                state.champion = null;
                return;
            }
            state[round][idx] = null;
            const next = getNextRound(round, idx);
            if (next) resetForward(next.nextRound, next.nextIdx);
        }

        function animateBall(startEl, nextRound, nextIdx, callback) {
            const targetId = (nextRound === 'champion') ? 'champ-court' : `slot-${nextRound}-${nextIdx}`;
            const targetEl = document.getElementById(targetId);
            if (!startEl || !targetEl) { callback(); return; }

            const s = startEl.getBoundingClientRect();
            const t = targetEl.getBoundingClientRect();
            const b = document.createElement('div');
            b.className = 'passing-ball';
            b.innerText = '🏀';
            b.style.left = (s.left + s.width/2 - 20) + 'px';
            b.style.top = (s.top + s.height/2 - 20) + 'px';
            document.body.appendChild(b);

            b.offsetHeight; 

            b.style.left = (t.left + t.width/2 - 20) + 'px';
            b.style.top = (t.top + t.height/2 - 20) + 'px';
            b.style.transform = 'scale(1.5) rotate(1080deg)';
            b.style.opacity = '0.4';

            setTimeout(() => {
                b.remove();
                callback();
            }, 1200); 
        }

        function triggerCelebration() {
            const duration = 4 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ea580c', '#ffffff', '#1e293b']
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ea580c', '#ffffff', '#1e293b']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function render() {
            document.getElementById('student-name-input').value = state.studentName;

            const drawRound = (id, arr, roundName, winnersArr) => {
                const container = document.getElementById(id);
                container.innerHTML = '';
                for (let i = 0; i < arr.length; i += 2) {
                    const box = document.createElement('div');
                    box.className = 'game-box';
                    const vs = document.createElement('div');
                    vs.className = 'vs-divider';
                    vs.innerText = 'VS';
                    box.appendChild(vs);
                    box.appendChild(createSlot(arr[i], roundName, i, winnersArr[Math.floor(i/2)] === arr[i] && arr[i] !== null));
                    box.appendChild(createSlot(arr[i+1], roundName, i+1, winnersArr[Math.floor(i/2)] === arr[i+1] && arr[i+1] !== null));
                    container.appendChild(box);
                }
            };

            drawRound('left-r1', state.leftR1, 'leftR1', state.leftR2);
            drawRound('right-r1', state.rightR1, 'rightR1', state.rightR2);
            drawRound('left-r2', state.leftR2, 'leftR2', state.leftR3);
            drawRound('right-r2', state.rightR2, 'rightR2', state.rightR3);
            drawRound('left-r3', state.leftR3, 'leftR3', state.f4Left);
            drawRound('right-r3', state.rightR3, 'rightR3', state.f4Right);
            drawRound('f4-left', state.f4Left, 'f4Left', [state.champGame[0]]);
            drawRound('f4-right', state.f4Right, 'f4Right', [state.champGame[1]]);

            const court = document.getElementById('champ-court');
            court.innerHTML = '';

            if (state.champion) {
                const card = document.createElement('div');
                card.id = 'final-champion-display';
                card.className = 'champion-card w-full';
                card.innerHTML = `
                    <div class="text-7xl mb-2">${valuesData[state.champion].icon}</div>
                    <div class="text-4xl font-black uppercase italic">${state.champion}</div>
                    <div class="text-[10px] mt-2 font-bold tracking-widest opacity-90 uppercase">🏆 THE CORE VALUE CHAMPION 🏆</div>
                    <div class="text-[8px] mt-6 opacity-40 uppercase tracking-tighter no-print">(Click here to reconsider)</div>
                `;
                card.onclick = () => {
                    state.champion = null;
                    render();
                    saveState();
                };
                card.onmouseenter = () => showReport(state.champion);
                court.appendChild(card);
            } else {
                const finalGame = document.createElement('div');
                finalGame.id = 'champ-court-inner';
                finalGame.className = 'bg-slate-900 border-4 border-slate-700 p-4 rounded-xl w-full shadow-2xl';
                
                const topFinalist = createSlot(state.champGame[0], 'champGame', 0, false);
                topFinalist.classList.add('justify-center', 'rounded', 'mb-2');
                
                const vsLabel = document.createElement('div');
                vsLabel.className = 'text-center text-white/30 text-[10px] font-black uppercase py-2 tracking-widest';
                vsLabel.innerText = 'THE GRAND FINAL';

                const botFinalist = createSlot(state.champGame[1], 'champGame', 1, false);
                botFinalist.classList.add('justify-center', 'rounded', 'mt-2');

                finalGame.appendChild(topFinalist);
                finalGame.appendChild(vsLabel);
                finalGame.appendChild(botFinalist);
                court.appendChild(finalGame);
            }
        }

        function saveState() {
            state.studentName = document.getElementById('student-name-input').value;
            localStorage.setItem('values_bracket_v8', JSON.stringify(state));
        }

        function shareBracket() {
            saveState();
            const data = btoa(JSON.stringify(state));
            const url = window.location.origin + window.location.pathname + '?bracket=' + data;
            
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = url;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);

            const btn = document.getElementById('share-btn');
            const oldText = btn.innerText;
            btn.innerText = "COPIED TO CLIPBOARD!";
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            setTimeout(() => {
                btn.innerText = oldText;
                btn.classList.replace('bg-green-600', 'bg-blue-600');
            }, 2000);
        }

        function resetTournament() {
            if (!confirm("Are you sure? This will wipe your current bracket progress.")) return;
            localStorage.removeItem('values_bracket_v8');
            window.location.href = window.location.origin + window.location.pathname;
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const bracketParam = params.get('bracket');
            if (bracketParam) {
                try {
                    state = JSON.parse(atob(bracketParam));
                } catch(e) { console.error("Link corruption"); }
            } else {
                const saved = localStorage.getItem('values_bracket_v8');
                if (saved) state = JSON.parse(saved);
            }
            render();
        };

        document.getElementById('student-name-input').addEventListener('input', saveState);
    </script>
</body>
</html>
